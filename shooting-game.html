<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMIC STRIKE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;600&display=swap');
        
        :root {
            --neon-cyan: #00fff9;
            --neon-pink: #ff0080;
            --neon-purple: #bd00ff;
            --deep-space: #0a0a1a;
            --star-white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--deep-space);
            overflow: hidden;
            cursor: none;
        }
        
        #gameCanvas {
            display: block;
            background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 100%);
            image-rendering: crisp-edges;
        }
        
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        
        .stat {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            letter-spacing: 2px;
        }
        
        .stat-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 300;
            color: rgba(0, 255, 249, 0.6);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .health-bar {
            width: 200px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            box-shadow: 0 0 10px var(--neon-pink);
            transition: width 0.3s ease;
        }
        
        #startScreen, #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 26, 0.95);
            z-index: 100;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .title {
            font-family: 'Orbitron', monospace;
            font-size: 96px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-shadow: 0 0 40px rgba(0, 255, 249, 0.5);
            animation: pulse 2s ease-in-out infinite;
            letter-spacing: 8px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }
        
        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }
        
        .btn {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            padding: 20px 60px;
            background: transparent;
            color: var(--neon-cyan);
            border: 3px solid var(--neon-cyan);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--neon-cyan);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        .btn:hover {
            color: var(--deep-space);
            box-shadow: 0 0 40px var(--neon-cyan);
            transform: scale(1.05);
        }
        
        .btn:hover::before {
            left: 0;
        }
        
        .controls {
            margin-top: 60px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .controls div {
            margin: 8px 0;
        }
        
        #crosshair {
            position: fixed;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
        }
        
        .crosshair-line {
            position: absolute;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .crosshair-h {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .crosshair-v {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .crosshair-circle {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .final-score {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            margin-bottom: 40px;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud">
        <div>
            <div class="stat-label">Score</div>
            <div class="stat" id="score">0</div>
        </div>
        <div>
            <div class="stat-label">Health</div>
            <div class="health-bar">
                <div class="health-fill" id="healthFill"></div>
            </div>
        </div>
        <div>
            <div class="stat-label">Wave</div>
            <div class="stat" id="wave">1</div>
        </div>
    </div>
    
    <div id="crosshair">
        <div class="crosshair-line crosshair-h"></div>
        <div class="crosshair-line crosshair-v"></div>
        <div class="crosshair-circle"></div>
    </div>
    
    <div id="startScreen">
        <div class="title">COSMIC STRIKE</div>
        <div class="subtitle">Defend the Galaxy</div>
        <button class="btn" onclick="startGame()">ENGAGE</button>
        <div class="controls">
            <div>MOVE: Arrow Keys or WASD</div>
            <div>SHOOT: Spacebar or Click</div>
            <div>AIM: Mouse</div>
        </div>
    </div>
    
    <div id="gameOver" style="display: none;">
        <div class="title">MISSION FAILED</div>
        <div class="final-score" id="finalScore">Score: 0</div>
        <button class="btn" onclick="restartGame()">RETRY</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Game state
        let gameActive = false;
        let score = 0;
        let wave = 1;
        let health = 100;
        
        // Player
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 40,
            height: 40,
            speed: 6,
            angle: 0
        };
        
        // Arrays
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        
        // Input
        const keys = {};
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        
        // Initialize stars
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 2 + 0.5
            });
        }
        
        // Event listeners
        document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            document.getElementById('crosshair').style.left = mouseX + 'px';
            document.getElementById('crosshair').style.top = mouseY + 'px';
        });
        
        document.addEventListener('click', shoot);
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && gameActive) {
                e.preventDefault();
                shoot();
            }
        });
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameActive = true;
            score = 0;
            wave = 1;
            health = 100;
            bullets = [];
            enemies = [];
            particles = [];
            updateHUD();
            spawnEnemies();
            gameLoop();
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        function shoot() {
            if (!gameActive) return;
            
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 10,
                vy: Math.sin(angle) * 10,
                size: 4
            });
            
            // Muzzle flash particles
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(angle) * Math.random() * 3 + Math.random() * 2 - 1,
                    vy: Math.sin(angle) * Math.random() * 3 + Math.random() * 2 - 1,
                    size: Math.random() * 3 + 1,
                    life: 20,
                    color: Math.random() > 0.5 ? '#00fff9' : '#ff0080'
                });
            }
        }
        
        function spawnEnemies() {
            const count = 3 + wave * 2;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    enemies.push({
                        x: Math.random() * canvas.width,
                        y: -50,
                        size: 30,
                        speed: 1 + Math.random() * 2 + wave * 0.3,
                        health: 3,
                        hue: Math.random() * 360
                    });
                }, i * 500);
            }
        }
        
        function updatePlayer() {
            // Movement
            if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
            if (keys['arrowright'] || keys['d']) player.x += player.speed;
            if (keys['arrowup'] || keys['w']) player.y -= player.speed;
            if (keys['arrowdown'] || keys['s']) player.y += player.speed;
            
            // Boundaries
            player.x = Math.max(player.width, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(player.height, Math.min(canvas.height - player.height, player.y));
            
            // Aim angle
            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);
        }
        
        function updateBullets() {
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                return bullet.x > 0 && bullet.x < canvas.width && 
                       bullet.y > 0 && bullet.y < canvas.height;
            });
        }
        
        function updateEnemies() {
            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;
                
                // Check collision with player
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (dist < player.width / 2 + enemy.size / 2) {
                    health -= 10;
                    enemies.splice(eIndex, 1);
                    createExplosion(enemy.x, enemy.y, enemy.hue);
                    updateHUD();
                    
                    if (health <= 0) {
                        gameOver();
                    }
                }
                
                // Check collision with bullets
                bullets.forEach((bullet, bIndex) => {
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    if (dist < enemy.size / 2 + bullet.size) {
                        enemy.health--;
                        bullets.splice(bIndex, 1);
                        
                        if (enemy.health <= 0) {
                            score += 10;
                            enemies.splice(eIndex, 1);
                            createExplosion(enemy.x, enemy.y, enemy.hue);
                            updateHUD();
                        }
                    }
                });
                
                // Remove if off screen
                if (enemy.y > canvas.height + 50) {
                    enemies.splice(eIndex, 1);
                    health -= 5;
                    updateHUD();
                    
                    if (health <= 0) {
                        gameOver();
                    }
                }
            });
            
            // Next wave
            if (enemies.length === 0 && gameActive) {
                wave++;
                updateHUD();
                setTimeout(spawnEnemies, 2000);
            }
        }
        
        function updateParticles() {
            particles = particles.filter(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.vy += 0.1;
                particle.life--;
                return particle.life > 0;
            });
        }
        
        function createExplosion(x, y, hue) {
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 4 + 2,
                    life: 30,
                    color: `hsl(${hue}, 100%, 50%)`
                });
            }
        }
        
        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }
        
        function drawStars() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            stars.forEach(star => {
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
        }
        
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // Ship body
            ctx.fillStyle = '#00fff9';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00fff9';
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-15, -12);
            ctx.lineTo(-10, 0);
            ctx.lineTo(-15, 12);
            ctx.closePath();
            ctx.fill();
            
            // Engine glow
            ctx.fillStyle = '#ff0080';
            ctx.shadowColor = '#ff0080';
            ctx.fillRect(-15, -4, -8, 8);
            
            ctx.restore();
        }
        
        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = '#00fff9';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00fff9';
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.fillStyle = `hsl(${enemy.hue}, 100%, 50%)`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${enemy.hue}, 100%, 50%)`;
                
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                ctx.rotate(Date.now() / 500);
                
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI * 2 / 6) * i;
                    const x = Math.cos(angle) * enemy.size;
                    const y = Math.sin(angle) * enemy.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            });
        }
        
        function drawParticles() {
            particles.forEach(particle => {
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / 30;
                ctx.shadowBlur = 10;
                ctx.shadowColor = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }
        
        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('wave').textContent = wave;
            document.getElementById('healthFill').style.width = Math.max(0, health) + '%';
        }
        
        function gameOver() {
            gameActive = false;
            document.getElementById('finalScore').textContent = `Score: ${score}`;
            document.getElementById('gameOver').style.display = 'flex';
        }
        
        function gameLoop() {
            if (!gameActive) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0;
            
            updateStars();
            drawStars();
            
            updatePlayer();
            updateBullets();
            updateEnemies();
            updateParticles();
            
            drawParticles();
            drawBullets();
            drawEnemies();
            drawPlayer();
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
